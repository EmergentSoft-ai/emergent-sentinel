# ═══════════════════════════════════════════════════════════════
# SENTINEL MIND OS — nginx.conf (Production Reverse Proxy)
# TLS termination para N8N. Scanner JAMAS expuesto al exterior.
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  sentinel  '$remote_addr [$time_local] "$request" '
                          '$status $body_bytes_sent rt=$request_time';
    access_log  /var/log/nginx/access.log sentinel;

    sendfile         on;
    tcp_nopush       on;
    tcp_nodelay      on;
    keepalive_timeout 65;
    server_tokens    off;   # No revelar version de Nginx

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain application/json application/javascript text/css;

    client_max_body_size     10m;
    client_body_timeout      30s;
    client_header_timeout    30s;
    send_timeout             60s;

    # Rate limiting — previene flood de webhooks y brute force
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Headers de seguridad globales
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "no-referrer"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    upstream n8n_backend {
        server n8n:5678;
        keepalive 32;
    }

    # ═══════════════════════════════════════════════════════════
    # SERVER 1: HTTP -> HTTPS redirect
    # ═══════════════════════════════════════════════════════════
    server {
        listen      80;
        listen      [::]:80;
        server_name _;

        # Challenge de Let's Encrypt / Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════
    # SERVER 2: HTTPS — N8N Proxy con TLS
    # ═══════════════════════════════════════════════════════════
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name _;   # Reemplazar con tu dominio en produccion

        ssl_certificate     /etc/ssl/sentinel/fullchain.pem;
        ssl_certificate_key /etc/ssl/sentinel/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        ssl_stapling              on;
        ssl_stapling_verify       on;
        resolver                  1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout          5s;

        limit_conn conn 20;

        # Bloquear bots de escaneo comunes
        if ($http_user_agent ~* (nikto|sqlmap|nmap|masscan|zgrab|dirbuster|gobuster)) {
            return 444;
        }

        # ── Ruta: Webhook de GitHub → N8N ─────────────────────
        # Rate limit agresivo — GitHub envia max 1 push/seg normalmente
        location /webhook/ {
            limit_req  zone=webhook burst=10 nodelay;
            limit_req_status 429;
            limit_except POST { deny all; }

            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout  10s;
            proxy_send_timeout     15s;
            proxy_read_timeout     15s;
        }

        # ── Ruta: N8N UI y API (workflows, editor) ────────────
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass         http://n8n_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket support para el editor de N8N en tiempo real
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_connect_timeout  30s;
            proxy_send_timeout     300s;
            proxy_read_timeout     300s;
            proxy_buffering        off;
        }

        # ── Scanner: JAMAS accesible desde el exterior ────────
        # El Scanner corre en red interna y solo N8N puede llamarlo
        # Esta regla existe para loguear intentos de acceso externo
        location /internal/ {
            deny all;
            return 404;
        }

        # ── Health check para uptime monitors ─────────────────
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Bloquear archivos sensibles ───────────────────────
        location ~ /\.(env|git|htaccess|DS_Store) {
            deny all;
            return 404;
        }
        location ~ \.(sql|bak|backup|log|conf)$ {
            deny all;
            return 404;
        }
    }
}

# ═══════════════════════════════════════════════════════════════
# GENERAR CERTS SELF-SIGNED (solo para desarrollo/testing):
#
#   mkdir -p ./certs
#   openssl req -x509 -nodes -days 365 -newkey rsa:4096 \
#     -keyout ./certs/privkey.pem \
#     -out    ./certs/fullchain.pem \
#     -subj   "/C=US/O=SentinelMind/CN=localhost"
#
# PRODUCCION — Certbot + Let's Encrypt:
#   docker run --rm \
#     -v ./certs:/etc/letsencrypt \
#     -v ./certbot-www:/var/www/certbot \
#     certbot/certbot certonly --webroot \
#     --webroot-path=/var/www/certbot \
#     -d tu-dominio.com \
#     --email tu@email.com --agree-tos
# ═══════════════════════════════════════════════════════════════
